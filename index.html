<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JULIEN JEGU // CYBER PORTFOLIO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

<style>
body{
margin:0;
background:#050510;
color:white;
font-family:'Share Tech Mono';
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{
font-family:'Orbitron';
color:#ff00ff;
}

ul{
display:flex;
gap:20px;
list-style:none;
}

a{
color:#00ffff;
text-decoration:none;
}

/* SECTIONS */
section{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:4rem;
text-shadow:0 0 20px #ff00ff;
}

.card,.project{
padding:20px;
border:1px solid cyan;
margin:10px;
transition:0.3s;
}

.card:hover,.project:hover{
transform:scale(1.1);
box-shadow:0 0 20px cyan;
}

/* LOADER */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* CURSOR */
#cursor{
width:20px;
height:20px;
border:2px solid cyan;
position:fixed;
border-radius:50%;
pointer-events:none;
}

/* AUDIO BTN */
#audioControl{
position:fixed;
bottom:20px;
right:20px;
cursor:pointer;
font-size:20px;
}

/* BUTTON */
button{
padding:15px 30px;
background:none;
border:2px solid cyan;
color:cyan;
cursor:pointer;
margin-top:20px;
}
button:hover{
background:cyan;
color:black;
}
</style>

</head>
<body>

<div id="loader">
<h1>INITIALIZING SYSTEM...</h1>
</div>

<audio id="bgMusic" loop>
<source src="musique.mp3" type="audio/mpeg">
</audio>

<nav>
<div class="logo">JJ.EXE</div>
<ul>
<li><a href="#hero">Profil</a></li>
<li><a href="#skills">Skills</a></li>
<li><a href="#projects">Projets</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<div id="cursor"></div>

<section id="hero">
<h1>JULIEN JEGU</h1>
<p>BTS SIO SISR // CYBER SECURITY</p>
<button id="startBtn">ENTER SYSTEM</button>
</section>

<section id="skills">
<h2>COMPÉTENCES</h2>
<div class="card">RÉSEAUX</div>
<div class="card">CYBERSÉCURITÉ</div>
<div class="card">DEV</div>
</section>

<section id="projects">
<h2>PROJETS</h2>
<div class="project">PROJECT PEGASE</div>
<div class="project">NEURAL INTERFACE</div>
</section>

<section id="contact">
<h2>CONTACT</h2>
<p>julienjegu13@gmail.com</p>
</section>

<div id="audioControl">🔊</div>

<script>
const loader=document.getElementById("loader");
const cursor=document.getElementById("cursor");
const music=document.getElementById("bgMusic");
const audioBtn=document.getElementById("audioControl");
const startBtn=document.getElementById("startBtn");

window.addEventListener("load",()=>{
setTimeout(()=>{loader.style.display="none"},1500);
});

startBtn.addEventListener("click",()=>{
music.volume=0.3;
music.play();
});

audioBtn.addEventListener("click",()=>{
if(music.paused){
music.play();
audioBtn.textContent="🔊";
}else{
music.pause();
audioBtn.textContent="🔇";
}
});

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

gsap.from("h1",{opacity:0,y:-50,duration:1});
gsap.from(".card",{opacity:0,y:50,stagger:0.2});
</script>

</body>
</html>
