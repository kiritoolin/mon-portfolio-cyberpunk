<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Julien</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#050510;
color:white;
font-family:Orbitron;
text-align:center;
}

/* loader */
#loader{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

/* section */
section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

button{
padding:15px;
border:2px solid cyan;
background:none;
color:cyan;
cursor:pointer;
}

/* audio btn */
#audioBtn{
position:fixed;
bottom:20px;
right:20px;
font-size:20px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="loader">LOADING...</div>

<section>
<h1>JULIEN JEGU</h1>
<button id="startBtn">ACTIVER LE SON</button>
</section>

<div id="audioBtn">🔇</div>

<audio id="music" loop>
<source src="musique.mp3" type="audio/mpeg">
</audio>

<script>
const loader=document.getElementById("loader");
const music=document.getElementById("music");
const startBtn=document.getElementById("startBtn");
const audioBtn=document.getElementById("audioBtn");

/* loader */
window.onload=()=>{
setTimeout(()=>loader.style.display="none",1000);
};

/* IMPORTANT : interaction utilisateur obligatoire */
startBtn.addEventListener("click",()=>{
music.volume=0.3;
music.play().then(()=>{
audioBtn.textContent="🔊";
}).catch(()=>{
alert("Le son ne peut pas démarrer (fichier manquant ou bloqué)");
});
});

/* toggle */
audioBtn.addEventListener("click",()=>{
if(music.paused){
music.play();
audioBtn.textContent="🔊";
}else{
music.pause();
audioBtn.textContent="🔇";
}
});
</script>

</body>
</html>
