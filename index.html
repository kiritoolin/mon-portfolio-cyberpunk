<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JULIEN JEGU // NEURAL_INTERFACE v2.0</title>
    <link rel="stylesheet" href="style.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

    <!-- ═══════════════════════════════════════════
         CURSEUR PERSONNALISÉ
    ═══════════════════════════════════════════ -->
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <!-- ═══════════════════════════════════════════
         BOOT / LOADER
    ═══════════════════════════════════════════ -->
    <div id="boot-screen">
        <div class="boot-content">
            <div class="boot-logo glitch" data-text="JULIEN_JEGU">JULIEN_JEGU</div>
            <div class="boot-subtitle">NEURAL_INTERFACE v2.0</div>
            <div class="boot-bar-wrap">
                <div class="boot-bar" id="bootBar"></div>
            </div>
            <div class="boot-log" id="bootLog"></div>
            <button class="btn-primary" id="bootBtn" style="display:none;" onclick="launchSystem()">
                <span>[ INITIALISER_CONNEXION ]</span>
            </button>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════
         SCANLINES OVERLAY
    ═══════════════════════════════════════════ -->
    <div id="scanlines"></div>

    <!-- ═══════════════════════════════════════════
         NAVIGATION
    ═══════════════════════════════════════════ -->
    <nav id="navbar">
        <div class="nav-logo glitch" data-text="JJ">JJ</div>
        <ul class="nav-links">
            <li><a href="#hero" class="nav-link" data-section="hero">PROFIL</a></li>
            <li><a href="#skills" class="nav-link" data-section="skills">COMPÉTENCES</a></li>
            <li><a href="#experience" class="nav-link" data-section="experience">EXPÉRIENCE</a></li>
            <li><a href="#projects" class="nav-link" data-section="projects">PROJETS</a></li>
            <li><a href="#secure" class="nav-link" data-section="secure">VAULT</a></li>
            <li><a href="#contact" class="nav-link" data-section="contact">CONTACT</a></li>
        </ul>
        <div class="nav-controls">
            <!-- Bouton thème -->
            <button id="themeToggle" class="icon-btn" title="Changer le thème">
                <svg id="iconTheme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <!-- Bouton audio -->
            <button id="audioToggle" class="icon-btn" title="Musique">
                <svg id="iconAudio" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                    <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                    <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                </svg>
            </button>
            <div class="nav-hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Menu mobile -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="#hero" onclick="closeMobile()">PROFIL</a>
        <a href="#skills" onclick="closeMobile()">COMPÉTENCES</a>
        <a href="#experience" onclick="closeMobile()">EXPÉRIENCE</a>
        <a href="#projects" onclick="closeMobile()">PROJETS</a>
        <a href="#secure" onclick="closeMobile()">VAULT</a>
        <a href="#contact" onclick="closeMobile()">CONTACT</a>
    </div>

    <!-- ═══════════════════════════════════════════
         AUDIO
    ═══════════════════════════════════════════ -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <!-- ═══════════════════════════════════════════
         CONTENU PRINCIPAL
    ═══════════════════════════════════════════ -->
    <main>

        <!-- ── HERO ── -->
        <section id="hero" class="section">
            <div class="hero-bg-grid"></div>
            <div class="hero-particles" id="heroParticles"></div>
            <div class="container hero-content">
                <div class="hero-tag fade-in">>> PROFIL_SYSTÈME &lt;v2.0&gt;</div>
                <h1 class="hero-name gl
