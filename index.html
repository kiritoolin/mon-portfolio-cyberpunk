<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>JULIEN JEGU // PORTFOLIO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --cyan: #00e5ff; --magenta: #ff003c; --bg: #000913; --card: rgba(0, 15, 40, 0.6);
            --orb: 'Orbitron', sans-serif; --mono: 'Share Tech Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: #b8deff; overflow-x: hidden; }
        nav { background: rgba(0, 5, 15, 0.9); border-bottom: 2px solid var(--cyan); padding: 15px 5%; position: fixed; width: 100%; top: 0; z-index: 1000; display: flex; justify-content: space-between; }
        .nav-links { display: flex; gap: 20px; list-style: none; }
        .nav-links a { color: var(--cyan); text-decoration: none; font-family: var(--mono); text-transform: uppercase; }
        .wrap { max-width: 1000px; margin: 0 auto; padding: 100px 20px; }
        .glass-panel { background: var(--card); backdrop-filter: blur(10px); border: 1px solid rgba(0, 229, 255, 0.3); padding: 40px; position: relative; border-left: 4px solid var(--cyan); }
        h1 { font-family: var(--orb); font-size: clamp(2rem, 8vw, 4rem); color: #fff; text-shadow: 3px 3px var(--magenta); }
        .sec-title { font-family: var(--orb); color: var(--magenta); border-left: 5px solid var(--magenta); padding-left: 15px; margin: 40px 0 20px; }
        .video-container { border: 2px solid var(--magenta); background: #000; padding: 5px; }
        video { width: 100%; aspect-ratio: 16/9; display: block; }
        #boot-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
        .btn-init { background: none; border: 2px solid var(--cyan); color: var(--cyan); padding: 20px 40px; font-family: var(--orb); cursor: pointer; }
        #hud-audio { position: fixed; bottom: 20px; right: 20px; z-index: 1001; background: rgba(0,0,0,0.8); border: 1px solid var(--cyan); padding: 10px; }
    </style>
</head>
<body>
    <div id="boot-screen">
        <button class="btn-init" onclick="startSystem()">INITIALIZE_CONNECTION</button>
    </div>
    <nav>
        <div style="font-family: var(--orb); color: var(--magenta);">JJ // 2026</div>
        <ul class="nav-links">
            <li><a href="#hero">Profil</a></li>
            <li><a href="#skills">Compétences</a></li>
            <li><a href="#media">Archives</a></li>
        </ul>
    </nav>
    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>
    <section id="hero" class="wrap">
        <div class="glass-panel">
            <h1 class="hero-name">JULIEN JEGU</h1>
            <p style="color:var(--magenta); font-family: var(--mono); font-weight: bold;">BTS SIO OPTION SISR // ÉCOLE PRATIQUE</p>
            <p style="margin-top:20px;">Futur expert en cybersécurité et réseaux. Connexion établie avec le portfolio v2.0.</p>
        </div>
    </section>
    <section id="media" class="wrap">
        <h2 class="sec-title">ARCHIVES_MÉDIAS</h2>
        <div class="video-container">
            <video controls><source src="video.mp4" type="video/mp4"></video>
        </div>
    </section>
    <div id="hud-audio"><button onclick="toggleMusic()" style="background:none; border:none; color:var(--cyan); cursor:pointer; font-family:var(--mono);">[ 🔊 AUDIO ]</button></div>
    <script>
        const music = document.getElementById('bgMusic');
        function startSystem() {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; music.volume = 0.2; music.play(); }, 500);
        }
        function toggleMusic() { if (music.paused) music.play(); else music.pause(); }
    </script>
</body>
</html>
